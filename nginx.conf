events { worker_connections 1024; }

http {
    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy timeouts
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    # litlabs.net → Next.js :3000
    server {
        listen 80;
        server_name litlabs.net www.litlabs.net;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name litlabs.net www.litlabs.net;

        ssl_certificate     /etc/nginx/ssl/litlabs.net.crt;
        ssl_certificate_key /etc/nginx/ssl/litlabs.net.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://litlabs:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # n8n.litlabs.net → n8n :5678
    server {
        listen 80;
        server_name n8n.litlabs.net;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name n8n.litlabs.net;

        ssl_certificate     /etc/nginx/ssl/litlabs.net.crt;
        ssl_certificate_key /etc/nginx/ssl/litlabs.net.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_buffering    off;
        }
    }
}
