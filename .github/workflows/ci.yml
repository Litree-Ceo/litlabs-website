name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            node_modules/.cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - run: npm ci

      - run: npm run lint
        continue-on-error: true

      - run: npm run build

      - name: Upload build stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-stats
          path: |
            .next/analyze/*.html
            build-lint.log
