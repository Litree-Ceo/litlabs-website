[build-system]
requires = ["setuptools>=77.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli-anything-touchdesigner"
version = "1.0.0"
description = "Make TouchDesigner Agent-Native — CLI for AI agents, automation pipelines, and headless workflows"
license = "MIT"
requires-python = ">=3.9"
dependencies = [
    "click>=8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
cli-anything-touchdesigner = "cli_anything_touchdesigner.cli:main"
td-cli = "cli_anything_touchdesigner.cli:main"

[tool.setuptools.packages.find]
include = ["cli_anything_touchdesigner*"]
