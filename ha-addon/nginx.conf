worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Ingress-aware server
    server {
        listen 3000 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check for Supervisor
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Next.js static assets (long cache)
        location /_next/static {
            alias /usr/share/nginx/html/.next/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Public files
        location /public {
            alias /usr/share/nginx/html/public;
            expires 1y;
            access_log off;
        }

        # WebSocket proxy for real-time features
        location /api/gemini/chat {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # HA ingress headers pass-through
        location / {
            # Pass HA ingress headers to the app
            proxy_set_header X-HASSIO-INGRESS $http_x_hassio_ingress;
            proxy_set_header X-HASSIO-USER $http_x_hassio_user;
            proxy_set_header X-HASSIO-NAME $http_x_hassio_name;
            proxy_set_header X-Ingress-Path $http_x_ingress_path;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;

            try_files $uri $uri.html $uri/index.html /index.html;
        }

        # All other routes → index.html (SPA fallback)
        location @rewrite {
            rewrite ^/(.*)$ /index.html last;
        }
    }
}
